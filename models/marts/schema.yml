version: 2

models:
  - name: fct_bad_reviews_by_category
    description: "This table will provide the output showing worst product_category based on their rating percentage"

    columns:
      - name: product_category
        tests:
          - not_null
          - unique
      - name: total_reviews
        tests:
          - not_null
  
  - name: fct_category_performance
    description: "This table depicts which prodcut category did the best in terms of total orders and rating."

    columns:
      - name: product_category
        tests:
          - not_null
          - unique
      - name: avg_rating
        tests:
          - not_null
      - name: order_volume
        tests: 
          - not_null

  - name: fct_payment_analysis
    description: "This table depicts which payment type is mostly being used by customers to pay for their order along with the avg installment period."

    columns:
      - name: payment_type
        tests:
          - not_null
          - unique
      - name: count_payment_type
        tests:
          - not_null
      - name: avg_intallment_period
        tests:
          - not_null


        